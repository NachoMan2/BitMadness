<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Custom March Madness Bracket</title>

<style>
body {
  font-family: Arial;
}

#bracket {
  display: flex;
  gap: 20px;
}

.region {
  border: 2px solid black;
  padding: 5px;
}

.round {
  margin-bottom: 10px;
}

.game {
  border: 1px solid black;
  margin: 4px;
  padding: 4px;
  width: 150px;
}

select {
  width: 100%;
}

.correct { background: green; color: white; }
.wrong { background: red; color: white; }

</style>
</head>
<body>

<h1>Custom March Madness Bracket</h1>

<div id="bracket"></div>

<button onclick="submitBracket()">Submit Bracket</button>

<hr>

<h2>Admin</h2>

<input id="pw" type="password">
<button onclick="login()">Login</button>

<div id="admin"></div>


<script>

const ADMIN_PASSWORD = "letmein"
const MASTER_KEY = "masterResults"

const regions = ["North","South","East","West"]

const seedOrder = [1,16,8,9,5,12,4,13,6,11,3,14,7,10,2,15]

let teams = []
let id = 1

for (let r=0;r<4;r++) {
  for (let s=1;s<=16;s++) {
    teams.push({
      id:id,
      region:r,
      seed:s,
      name:"Seed "+s+" Team "+id
    })
    id++
  }
}

let picks = {}
let master = JSON.parse(localStorage.getItem(MASTER_KEY) || "{}")

let games = []

function makeGame(id,left,right,round,region){
  games.push({id,left,right,round,region})
}

function buildBracket(){

  regions.forEach((reg,r)=>{

    let rTeams = teams.filter(t=>t.region==r)

    let g = []

    for (let i=0;i<8;i++){

      let t1 = rTeams.find(t=>t.seed==seedOrder[i*2])
      let t2 = rTeams.find(t=>t.seed==seedOrder[i*2+1])

      let gid = reg+"_r0_"+i

      makeGame(gid,t1.id,t2.id,0,reg)

      g.push(gid)
    }

    let round = 1

    while (g.length>1){

      let next=[]

      for (let i=0;i<g.length;i+=2){

        let gid = reg+"_r"+round+"_"+i

        makeGame(gid,g[i],g[i+1],round,reg)

        next.push(gid)
      }

      g=next
      round++
    }

  })

}

buildBracket()

let teamMap={}
teams.forEach(t=>teamMap[t.id]=t)

function resolve(x){

  // If this is already a team id, return team
  if (teamMap[x]) {
    return teamMap[x]
  }

  // If this is a game id, use the picked winner
  if (picks[x] && teamMap[picks[x]]) {
    return teamMap[picks[x]]
  }

  // Otherwise blank
  return {id:0,name:""}
}

function drawGame(g){

  let div = document.createElement("div")
  div.className="game"

  let s = document.createElement("select")

  let a = resolve(g.left)
  let b = resolve(g.right)

  ;[a,b].forEach(t=>{
    let o=document.createElement("option")
    o.value=t.id
    o.text=t.name
    s.appendChild(o)
  })

  s.value = picks[g.id] || ""

  s.onchange=()=>{
    picks[g.id]=s.value
    render()
  }

  div.appendChild(s)

  if(master[g.id]){
    if(picks[g.id]==master[g.id]) div.classList.add("correct")
    else if(picks[g.id]) div.classList.add("wrong")
  }

  return div
}

function render(){

  let root=document.getElementById("bracket")
  root.innerHTML=""

  regions.forEach(reg=>{

    let box=document.createElement("div")
    box.className="region"

    let regGames=games.filter(g=>g.region==reg)

    for(let r=0;r<4;r++){

      let rd=document.createElement("div")
      rd.className="round"

      regGames
        .filter(g=>g.round==r)
        .forEach(g=>rd.appendChild(drawGame(g)))

      box.appendChild(rd)
    }

    root.appendChild(box)
  })

}

function submitBracket(){

  let key="user_"+Date.now()

  localStorage.setItem(key,JSON.stringify(picks))

  let w=window.open()

  w.document.write("<h1>Your Picks</h1>")
  w.document.write("<pre>"+JSON.stringify(picks,null,2)+"</pre>")

}

function login(){

  if(document.getElementById("pw").value!==ADMIN_PASSWORD) return

  let a=document.getElementById("admin")
  a.innerHTML=""

  games.forEach(g=>{

    let s=document.createElement("select")

    teams.forEach(t=>{
      let o=document.createElement("option")
      o.value=t.id
      o.text=t.name
      s.appendChild(o)
    })

    s.value=master[g.id]||""

    s.onchange=()=>{
      master[g.id]=s.value
      localStorage.setItem(MASTER_KEY,JSON.stringify(master))
      render()
    }

    a.append(g.id," ",s,document.createElement("br"))

  })

}

render()

</script>

</body>
</html>
