<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Bracket Layout</title>

<style>

body {
  font-family: Arial;
}

#bracket {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 20px;
}

.side {
  display: grid;
  grid-template-columns: repeat(4, 180px);
  gap: 20px;
}

/* flip right side */
#right {
  direction: rtl;
}

#right .round {
  direction: ltr;
}

.center {
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

.round {
  display: flex;
  flex-direction: column;
  justify-content: space-around;
  position: relative;
}

.game {
  border: 2px solid black;
  padding: 4px;
  margin: 6px 0;
  width: 160px;
  background: white;
  position: relative;
}

.team {
  font-size: 12px;
}

/* spacing */

.r64 .game { margin: 4px 0; }
.r32 .game { margin: 18px 0; }
.r16 .game { margin: 40px 0; }
.r8  .game { margin: 80px 0; }


/* ---------- CONNECTOR LINES ---------- */

.game::after {
  content: "";
  position: absolute;
  right: -20px;
  top: 50%;
  width: 20px;
  height: 2px;
  background: black;
}

/* flip horizontal for right side */
#right .game::after {
  right: auto;
  left: -20px;
}


/* vertical join */

.round:not(:last-child) .game:nth-child(odd)::before {
  content: "";
  position: absolute;
  right: -20px;
  top: 50%;
  width: 2px;
  height: 40px;
  background: black;
}

.round:not(:last-child) .game:nth-child(even)::before {
  content: "";
  position: absolute;
  right: -20px;
  top: -40px;
  width: 2px;
  height: 40px;
  background: black;
}


/* flip vertical for right side */

#right .round:not(:last-child) .game:nth-child(odd)::before {
  right: auto;
  left: -20px;
}

#right .round:not(:last-child) .game:nth-child(even)::before {
  right: auto;
  left: -20px;
}


/* last column no line */

.side .round:last-child .game::after {
  display: none;
}

</style>

</head>
<body>

<h1>Custom March Madness Bracket</h1>

<div id="bracket">

  <div class="side" id="left"></div>

  <div class="center" id="center"></div>

  <div class="side" id="right"></div>

</div>


<script>

const seedOrder = [
  1,16,
  8,9,
  5,12,
  4,13,
  6,11,
  3,14,
  7,10,
  2,15
]

let teams = []

let id = 1

for (let r=0;r<4;r++) {
  for (let s=1;s<=16;s++) {
    teams.push({
      id:id,
      region:r,
      seed:s,
      name:"Seed "+s+" Team "+id
    })
    id++
  }
}



function createGame(t1,t2,index,region){

  let g = document.createElement("div")
  g.className="game"

  let select = document.createElement("select")

  let o1 = document.createElement("option")
  o1.value = t1.name
  o1.textContent = "("+t1.seed+") "+t1.name

  let o2 = document.createElement("option")
  o2.value = t2.name
  o2.textContent = "("+t2.seed+") "+t2.name

  select.appendChild(o1)
  select.appendChild(o2)

  select.onchange = () => {

    let r32 = document.querySelectorAll(
      `[data-region='${region}'][data-round='32'] select`
    )

    let target = Math.floor(index/2)

    let opt = document.createElement("option")
    opt.value = select.value
    opt.textContent = select.value

    r32[target].appendChild(opt)

  }

  g.appendChild(select)

  return g
}



function createDropdown(round,region){

  let g = document.createElement("div")
  g.className="game"
  g.dataset.round = round
  g.dataset.region = region

  let select = document.createElement("select")

  let blank = document.createElement("option")
  blank.textContent="Select"

  select.appendChild(blank)

  g.appendChild(select)

  return g
}



function drawRegion(regionIndex, sideDiv){

  let regionTeams = teams.filter(t=>t.region===regionIndex)

  let r64 = document.createElement("div")
  r64.className="round r64"

  for(let i=0;i<8;i++){

    let s1 = seedOrder[i*2]
    let s2 = seedOrder[i*2+1]

    let t1 = regionTeams.find(t=>t.seed===s1)
    let t2 = regionTeams.find(t=>t.seed===s2)

    r64.appendChild(createGame(t1,t2,i,regionIndex))

  }


  let r32 = document.createElement("div")
  r32.className="round r32"

  for(let i=0;i<4;i++){
    r32.appendChild(createDropdown(32,regionIndex))
  }


  let r16 = document.createElement("div")
  r16.className="round r16"

  for(let i=0;i<2;i++){
    r16.appendChild(createDropdown(16,regionIndex))
  }


  let r8 = document.createElement("div")
  r8.className="round r8"

  r8.appendChild(createDropdown(8,regionIndex))


  sideDiv.appendChild(r64)
  sideDiv.appendChild(r32)
  sideDiv.appendChild(r16)
  sideDiv.appendChild(r8)

}



function drawBracket(){

  let left = document.getElementById("left")
  let right = document.getElementById("right")
  let center = document.getElementById("center")

  left.innerHTML=""
  right.innerHTML=""
  center.innerHTML=""

  drawRegion(0,left)
  drawRegion(1,left)

  drawRegion(2,right)
  drawRegion(3,right)


  let f4 = createDropdown(4,"center")
  let champGame = createDropdown(2,"center")
  let champ = createDropdown(1,"center")

  center.appendChild(f4)
  center.appendChild(champGame)
  center.appendChild(champ)

}

drawBracket()

</script>

</body>
</html>
