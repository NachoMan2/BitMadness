<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Clickable March Madness Bracket</title>
<style>
body { font-family: Arial; }

#bracket { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; }

.side { display: grid; grid-template-columns: repeat(4, 180px); gap: 20px; }
#right { direction: rtl; }
#right .round { direction: ltr; }

.center { display: flex; flex-direction: column; justify-content: center; align-items: center; }

.round { display: flex; flex-direction: column; justify-content: space-around; position: relative; }

.game {
  border: 2px solid black;
  padding: 4px;
  margin: 6px 0;
  width: 160px;
  background: white;
  position: relative;
  cursor: pointer;
}

.team { font-size: 12px; }
.team.selected { background: #cce5ff; }

.r64 .game { margin: 4px 0; }
.r32 .game { margin: 18px 0; }
.r16 .game { margin: 40px 0; }
.r8  .game { margin: 80px 0; }

.game::after { content: ""; position: absolute; right: -20px; top: 50%; width: 20px; height: 2px; background: black; }
#right .game::after { right: auto; left: -20px; }

.round:not(:last-child) .game:nth-child(odd)::before { content: ""; position: absolute; right: -20px; top: 50%; width: 2px; height: 40px; background: black; }
.round:not(:last-child) .game:nth-child(even)::before { content: ""; position: absolute; right: -20px; top: -40px; width: 2px; height: 40px; background: black; }
#right .round:not(:last-child) .game:nth-child(odd)::before { right: auto; left: -20px; }
#right .round:not(:last-child) .game:nth-child(even)::before { right: auto; left: -20px; }

.side .round:last-child .game::after { display: none; }
</style>
</head>
<body>

<h1>Clickable March Madness Bracket</h1>
<div id="bracket">
  <div class="side" id="left"></div>
  <div class="center" id="center"></div>
  <div class="side" id="right"></div>
</div>

<script>
const seedOrder = [1,16, 8,9, 5,12, 4,13, 6,11, 3,14, 7,10, 2,15];
let teams = [], id=1;

// Generate teams
for(let r=0;r<4;r++){
  for(let s=1;s<=16;s++){
    teams.push({id:id, region:r, seed:s, name:"Seed "+s+" Team "+id});
    id++;
  }
}

// Map each game to next game
let nextGameMap = {};
let parentsMap = {};

// Create a team element
function createTeamElement(team, parentGame, nextGame, slot){
  let el = document.createElement("div");
  el.className="team";
  el.textContent="("+team.seed+") "+team.name;
  el.onclick = ()=>{
    parentGame.querySelectorAll(".team").forEach(t=>t.classList.remove("selected"));
    el.classList.add("selected");

    if(nextGame){
      if(!parentsMap[nextGame]) parentsMap[nextGame] = [null,null];
      parentsMap[nextGame][slot] = team;

      // Populate exactly two slots
      nextGame.innerHTML="";
      for(let i=0;i<2;i++){
        if(parentsMap[nextGame][i]){
          let slotEl = document.createElement("div");
          slotEl.className="team";
          slotEl.textContent="("+parentsMap[nextGame][i].seed+") "+parentsMap[nextGame][i].name;
          slotEl.onclick = ()=>createTeamElement(parentsMap[nextGame][i],null,nextGameMap[nextGame],0);
          nextGame.appendChild(slotEl);
        } else {
          let placeholder = document.createElement("div");
          placeholder.className="team";
          placeholder.textContent="Waiting...";
          nextGame.appendChild(placeholder);
        }
      }
    }
  };
  return el;
}

// Create a game
function createGame(t1,t2,nextGame,gameId){
  let g = document.createElement("div");
  g.className="game";
  g.dataset.gameId = gameId;
  g.appendChild(createTeamElement(t1,g,nextGame,0));
  g.appendChild(createTeamElement(t2,g,nextGame,1));
  return g;
}

// Empty game for next rounds
function createEmptyGame(gameId){
  let g = document.createElement("div");
  g.className="game";
  g.dataset.gameId = gameId;
  return g;
}

// Draw region side
function drawRegion(regionIndex, sideDiv, gameIdOffset){
  let regionTeams = teams.filter(t=>t.region===regionIndex);

  let r64 = document.createElement("div"); r64.className="round r64";
  let r32 = document.createElement("div"); r32.className="round r32";
  let r16 = document.createElement("div"); r16.className="round r16";
  let r8 = document.createElement("div"); r8.className="round r8";

  let r32Games = [], r16Games = [], r8Games = [];

  for(let i=0;i<4;i++){
    let g = createEmptyGame(gameIdOffset+100+i); r32.appendChild(g); r32Games.push(g);
  }
  for(let i=0;i<2;i++){
    let g = createEmptyGame(gameIdOffset+200+i); r16.appendChild(g); r16Games.push(g);
  }
  let g8 = createEmptyGame(gameIdOffset+300); r8.appendChild(g8); r8Games.push(g8);

  for(let i=0;i<8;i++){
    let s1=seedOrder[i*2], s2=seedOrder[i*2+1];
    let t1=regionTeams.find(t=>t.seed===s1);
    let t2=regionTeams.find(t=>t.seed===s2);
    let g = createGame(t1,t2,r32Games[Math.floor(i/2)],gameIdOffset+i);
    nextGameMap[g] = r32Games[Math.floor(i/2)];
    r64.appendChild(g);
  }

  r32Games.forEach((g,i)=>nextGameMap[g]=r16Games[Math.floor(i/2)]);
  r16Games.forEach((g,i)=>nextGameMap[g]=r8Games[0]);

  sideDiv.appendChild(r64); sideDiv.appendChild(r32); sideDiv.appendChild(r16); sideDiv.appendChild(r8);

  return r8Games[0];
}

// Draw bracket
function drawBracket(){
  let left = document.getElementById("left");
  let right = document.getElementById("right");
  let center = document.getElementById("center");

  left.innerHTML=""; right.innerHTML=""; center.innerHTML="";

  let leftR8Games = [drawRegion(0,left,0), drawRegion(1,left,1000)];
  let rightR8Games = [drawRegion(2,right,2000), drawRegion(3,right,3000)];

  // Final Four
  let f4Games = [];
  for(let i=0;i<4;i++){
    let g = createEmptyGame(4000+i);
    center.appendChild(g); f4Games.push(g);
  }

  nextGameMap[leftR8Games[0]]=f4Games[0];
  nextGameMap[leftR8Games[1]]=f4Games[1];
  nextGameMap[rightR8Games[0]]=f4Games[2];
  nextGameMap[rightR8Games[1]]=f4Games[3];

  // Championship
  let champ=createEmptyGame(5000);
  center.appendChild(champ);
  f4Games.forEach(g=>nextGameMap[g]=champ);

  // Final Winner
  let finalWinner=createEmptyGame(6000);
  center.appendChild(finalWinner);
  nextGameMap[champ]=finalWinner;
}

drawBracket();
</script>

</body>
</html>
